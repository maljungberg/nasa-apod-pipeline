name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Check out your code
      - name: Checkout code
        uses: actions/checkout@v4
      
      # Step 2: Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      # Step 3: Install dependencies
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r pipeline/requirements.txt
      
      # Step 4: Run tests
      - name: Run unit tests
        run: pytest tests/ -v
      
      # Step 5 (optional): Lint your code
      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 pipeline/ --max-line-length=120 --ignore=E501,W503