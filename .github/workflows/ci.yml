name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5       # <-- v5 (uses Node 24)

      - name: Set up Python
        uses: actions/setup-python@v6   # <-- v6 (uses Node 24)
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r pipeline/requirements.txt

      - name: Run unit tests
        run: pytest tests/ -v

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 pipeline/ --max-line-length=120